<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật Hồ sơ Nhà hàng</title>
    <style>
        form { display: flex; flex-direction: column; width: 300px; gap: 10px; }
        label { font-weight: bold; }
    </style>
</head>
<body>
<h2>Cập nhật thông tin quán</h2>

<form th:action="@{/merchant/update-profile}" th:object="${restaurantProfile}" method="POST">
    <label>Tên cửa hàng:</label>
    <input type="text" th:field="*{name}" placeholder="Nhập tên quán..." />

    <label>Số điện thoại:</label>
    <input type="text" th:field="*{phone}" />

    <label>
        <input type="checkbox" th:field="*{active}" />
        Đang mở cửa
    </label>

    <button type="submit">Lưu thông tin</button>
</form>
</body>
</html>
